<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      /* background-color: #f5f9fc; */
      background-color: black;
    }

    header {
      background-color: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .chatbot {
      width: 100%;
      max-width: 700px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: black;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .chat-header {
      background-color: #007bff;
      color: white;
      padding: 10px;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      text-align: center;
      font-size: 18px;
    }

    .chat-body {
      height: 450px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

  .chat-body img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto; /* Center the image */
}

    .message {
      padding: 10px;
      border-radius: 12px;
      max-width: 70%;
      font-size: 14px;
    }

    .user-message {
      align-self: flex-end;
      background-color: #007bff;
      color: black;
    }

    .bot-message {
      align-self: flex-start;
      background-color: #f1f1f1;
      color: black;
    }

    .chat-footer {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }

    .chat-footer input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
    }
    .image{
      width: 50px;
      height: 50px;
      border-radius: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    } 

  
    
    .chat-footer button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      margin-left: 5px;
      border-radius: 150px;
      cursor: pointer;
    }

    .chat-footer button:hover {
      background-color: #0056b3;
    }

    .choose{
      width: 40px ;
      height: 40px;
      border-radius: 50%;
    }
    
  </style>

</head>
<body>
  <header>AI CHATBOT</header>

  <div class="container">
    <div class="chatbot">
      <div class="chat-header">Ask me Anything!</div>

      <div class="chat-body" id="chatBody">
        <div class="bot-message message">Hello! How can I assist you today?</div>
      </div>

      <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Type your message here...">
        <button class="image"><img src="image-02-solid-rounded.svg" alt="">
        <input type="file" hidden accept="image/*">
       </button>
        <button id="button">Send</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>

</body>
</html>
